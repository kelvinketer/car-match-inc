name: Build Android APK

on:
  push:
    branches:
      - main 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' 

      - name: Install NPM Packages
        working-directory: ./carmatch-mobile
        run: npm install

      - name: Setup Java (JDK 17 required for Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # --- THE NEW STEP: Generate the android folder dynamically ---
      - name: Generate Native Android Code (Expo Prebuild)
        working-directory: ./carmatch-mobile
        run: npx expo prebuild --platform android --clean

      - name: Make Gradle Executable
        working-directory: ./carmatch-mobile/android
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: ./carmatch-mobile/android
        run: ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CarMatch-Production-APK
          path: carmatch-mobile/android/app/build/outputs/apk/release/app-release.apk